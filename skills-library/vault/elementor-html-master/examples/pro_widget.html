<!-- 
    WIDGET: Pro Bento Grid Reference
    ESTILO: Diamond Sharp (Bordes sólidos, 0 radio)
    ESTÁNDARES: CSS-First, Scoped, Deterministic
-->

<div id="el-comp-bento-grid" class="el-comp-container">
    <div class="el-comp-grid">
        <!-- Los items se cargan de forma determinista -->
        <article class="el-comp-item" data-id="1">
            <div class="el-comp-image-placeholder"></div>
            <h3>Diseño Estratégico</h3>
            <p>Arquitectura visual de alta gama.</p>
        </article>
        <article class="el-comp-item" data-id="2">
            <div class="el-comp-image-placeholder"></div>
            <h3>Desarrollo Core</h3>
            <p>Código determinista y escalable.</p>
        </article>
        <article class="el-comp-item" data-id="3">
            <div class="el-comp-image-placeholder"></div>
            <h3>Optimización UX</h3>
            <p>Interacciones fluidas y ligeras.</p>
        </article>
    </div>
</div>

<style>
:root {
    /* Variables de Diseño (CSS-First) */
    --el-primary: #000000;
    --el-accent: #ff3300;
    --el-bg: #ffffff;
    --el-border: #000000;
    --el-text: #1a1a1a;
    --el-gap: 20px;
}

#el-comp-bento-grid {
    --fs-title: clamp(1.5rem, 4vw, 2.5rem); /* Tipografía Fluida */
    --fs-body: clamp(1rem, 2vw, 1.2rem);
    
    font-family: 'Inter', sans-serif;
    color: var(--el-text);
    background: var(--el-bg);
    width: 100%;
}

.el-comp-grid {
    display: grid;
    gap: var(--el-gap);
    grid-template-columns: repeat(auto-fit, minmax(300px, 1fr));
}

/* Estilo Diamond Sharp (0 radius, bordes definidos) */
.el-comp-item {
    border: 1px solid var(--el-border);
    padding: 30px;
    background: white;
    transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
    display: flex;
    flex-direction: column;
    justify-content: flex-end;
    min-height: 400px;
    position: relative;
    cursor: pointer;
}

.el-comp-item:hover {
    transform: translateY(-5px);
    box-shadow: 10px 10px 0px var(--el-primary); /* Sombra sólida retro */
}

.el-comp-item h3 {
    font-size: var(--fs-title);
    margin: 0 0 10px 0;
    text-transform: uppercase;
    font-weight: 900;
    line-height: 0.9;
}

.el-comp-item p {
    font-size: var(--fs-body);
    margin: 0;
    opacity: 0.8;
}

.el-comp-image-placeholder {
    position: absolute;
    top: 0;
    left: 0;
    width: 100%;
    height: 100%;
    background: linear-gradient(45deg, #f3f3f3 25%, transparent 25%), 
                linear-gradient(-45deg, #f3f3f3 25%, transparent 25%);
    background-size: 20px 20px;
    z-index: -1;
    opacity: 0.5;
}

/* Container Query (Componente Inteligente) */
@container (max-width: 500px) {
    .el-comp-item {
        padding: 20px;
        min-height: 300px;
    }
}
</style>

<script>
(function() {
    /**
     * Lógica Determinista y Profesional
     */
    const initWidget = () => {
        const container = document.getElementById('el-comp-bento-grid');
        if (!container) return;

        const items = Array.from(container.querySelectorAll('.el-comp-item'));
        
        // Ordenación Determinista por data-id para asegurar consistencia
        const sortedItems = items.sort((a, b) => {
            return parseInt(a.dataset.id) - parseInt(b.dataset.id);
        });

        console.log('Widget inicializado con éxito. Items cargados de forma determinista.');

        // Micro-interacción: Spotlight sutil
        container.addEventListener('mousemove', (e) => {
            sortedItems.forEach(item => {
                const rect = item.getBoundingClientRect();
                const x = e.clientX - rect.left;
                const y = e.clientY - rect.top;
                item.style.setProperty('--mouse-x', `${x}px`);
                item.style.setProperty('--mouse-y', `${y}px`);
            });
        });
    };

    // Ejecutar cuando Elementor esté listo o en carga estándar
    if (window.elementorFrontend) {
        window.addEventListener('elementor/frontend/init', initWidget);
    } else {
        document.addEventListener('DOMContentLoaded', initWidget);
    }
})();
</script>
