<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Newsreader:opsz,wght@6..72,200..800&family=Manrope:wght@200..800&display=swap" rel="stylesheet">
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        "ds-surface": "#121416",
                        "ds-container": "#242E35",
                        "ds-secondary": "#CFC6AB",
                        "ds-on-variant": "#8E9DA8"
                    },
                    fontFamily: {
                        "display": ["Newsreader", "serif"],
                        "data": ["Manrope", "sans-serif"]
                    }
                }
            }
        }
    </script>
    <style>
        .ds-title { font-family: 'Newsreader', serif; letter-spacing: -0.02em; }
        .no-line { border: none !important; }
    </style>
</head>
<body class="bg-ds-surface text-white font-data">
    <div class="flex flex-col lg:flex-row h-screen w-full overflow-hidden">
        
        <!-- Sidebar (35%) - "Architectural Weight" -->
        <aside class="w-full lg:w-[35%] bg-[#1A1C1E] p-12 flex flex-col shadow-[20px_0_50px_rgba(0,0,0,0.5)] z-10">
            <h1 class="text-6xl ds-title font-light mb-6">Título Editorial</h1>
            <p class="text-ds-on-variant uppercase tracking-widest text-sm mb-12">Subtítulo técnico en Manrope</p>
            
            <div class="flex-1 space-y-4">
                <!-- Active Item -->
                <div class="p-8 bg-ds-container border-l-2 border-ds-secondary flex flex-col gap-2">
                    <span class="text-2xl ds-title">Elemento Activo</span>
                    <span class="text-xs text-ds-on-variant">Metadata descriptiva</span>
                </div>
                <!-- Standard Item -->
                <div class="p-8 hover:bg-ds-container/50 transition-colors flex flex-col gap-2 cursor-pointer">
                    <span class="text-2xl ds-title">Elemento Standby</span>
                    <span class="text-xs text-ds-on-variant">Metadata descriptiva</span>
                </div>
            </div>
        </aside>

        <!-- Main (65%) - "Visual Space" -->
        <main class="flex-1 bg-ds-surface relative flex items-center justify-center">
            <div class="text-center opacity-20">
                <p class="ds-title text-8xl">Visual Content Area</p>
            </div>

            <!-- Glass HUD Overlay -->
            <div class="absolute top-10 right-10 p-4 bg-ds-container/70 backdrop-blur-2xl rounded-[0.25rem]">
                <button class="px-6 py-2 bg-ds-secondary text-ds-surface font-black text-[10px] uppercase tracking-widest">
                    Action CTA
                </button>
            </div>
        </main>

    </div>
</body>
</html>
