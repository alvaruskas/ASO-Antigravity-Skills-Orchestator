    Design Strategy: Architectural Brutalism / No-Line Protocol
    Logic: Real Geocoding + Proximity Sorting + Bidirectional Sync

<!-- 3. UI Widget (35/65 Asymmetry) -->

            <div class="space-y-8">

                <button onclick="filterByType('premium')" class="filter-btn px-6 py-3 text-[9px] font-black uppercase tracking-widest text-ds-on-variant hover:text-ds-on-surface rounded-sm transition-all" id="btn-premium">Tiendas</button>
                <button onclick="filterByType('restaurant')"  class="filter-btn px-6 py-3 text-[9px] font-black uppercase tracking-widest text-ds-on-variant hover:text-ds-on-surface rounded-sm transition-all" id="btn-restaurant">Hospitalidad</button>
            </div>
        </div>
        
        <div class="absolute bottom-10 right-10 z-[1000]">
            <button onclick="zoomToIncludeAll()" class="w-14 h-14 bg-ds-surface-high/80 backdrop-blur-xl text-ds-on-surface hover:text-ds-secondary flex items-center justify-center transition-all shadow-2xl">

        </div>

<!-- 4. Lógica de Negocio (Antigravity v4.0) -->
<script>
(function() {
    // Endpoints y Datos
    const API_URL = '/wp-json/masos/v1/stores'; // Fallback a mock si falla
    let masterData = [];
    let filteredData = [];
    let map = null;
    let markers = [];
    let activeMarker = null;
    let searchCenter = null;

    // 1. Inicialización
    async function init() {
        initMap();
        await fetchData();
        setupEventListeners();
    }

    function initMap() {
        map = L.map('masos-map', { 
            zoomControl: false, 
            attributionControl: false,
            wheelPxPerZoomLevel: 120
        }).setView([40.4168, -3.7038], 6);

        L.tileLayer('https://{s}.basemaps.cartocdn.com/dark_all/{z}/{x}/{y}{r}.png').addTo(map);
    }

    async function fetchData() {
        showLoader(true);
        try {
            // Intentar fetch real
            const response = await fetch(API_URL).catch(() => null);
            if (response && response.ok) {
                masterData = await response.json();
            } else {
                // Mock Data de Calidad para el Demo
                masterData = [
                    { "id": "1", "name": "Alfonso Lara Alimentación", "lat": 38.538, "lng": -0.131, "addr": "Carrer de la Garita 10", "city": "Benidorm", "type": "premium" },
                    { "id": "2", "name": "Apicola Pérez", "lat": 38.675, "lng": -0.198, "addr": "Calle de la Virgen 18", "city": "Guadalest", "type": "premium" },
                    { "id": "3", "name": "Restaurante La Paloma", "lat": 40.423, "lng": -3.682, "addr": "Calle de Jorge Juan 39", "city": "Madrid", "type": "restaurant" },
                    { "id": "4", "name": "Restaurante Estimar", "lat": 40.416, "lng": -3.695, "addr": "Calle del Marqués de Cubas 18", "city": "Madrid", "type": "restaurant" },
                    { "id": "5", "name": "THE COMM Restaurant", "lat": 38.576, "lng": -0.108, "addr": "Polígon Nou Racó 2", "city": "Alfaz del Pi", "type": "restaurant" }
                ];
            }
            filteredData = [...masterData];
            render();
        } catch (e) {
            console.error("Critical Failure:", e);
        } finally {
            showLoader(false);
        }
    }

    // 2. Lógica de Búsqueda y Geocodificación (Proximidad Real)
    async function geocode(query) {
        if (!query || query.length < 3) return null;
        try {
            const resp = await fetch(`https://nominatim.openstreetmap.org/search?format=json&q=${encodeURIComponent(query)}&limit=1`);
            const data = await resp.json();
            if (data && data[0]) {
                return {
                    lat: parseFloat(data[0].lat),
                    lng: parseFloat(data[0].lon),
                    name: data[0].display_name.split(',')[0]
                };
            }
        } catch (e) { console.error("Geocoding Error", e); }
        return null;
    }

    window.performSearch = async () => {
        const query = document.getElementById('masos-search').value;
        if (!query) {
            resetSearch();
            return;
        }

        showLoader(true);
        const center = await geocode(query);
        
        if (center) {
            searchCenter = center;
            map.flyTo([center.lat, center.lng], 12, { duration: 1.5 });
            
            document.getElementById('search-feedback').classList.remove('hidden');
            document.getElementById('search-center-name').innerText = center.name;
            
            // Ordenar por proximidad real al centro de búsqueda
            filteredData.sort((a, b) => distance(center.lat, center.lng, a.lat, a.lng) - distance(center.lat, center.lng, b.lat, b.lng));
        } else {
            // Fallback: Filtrado de texto simple si falla el geocode
            filteredData = masterData.filter(s => 
                s.name.toLowerCase().includes(query.toLowerCase()) || 
                s.city?.toLowerCase().includes(query.toLowerCase())
            );
        }
        
        render();
        showLoader(false);
    };

    function resetSearch() {
        searchCenter = null;
        filteredData = [...masterData];
        document.getElementById('search-feedback').classList.add('hidden');
        render();
        zoomToIncludeAll();
    }

    // 3. Renderizado y Sincronización
    function render() {
        const listContainer = document.getElementById('store-list-container');
        const countLabel = document.getElementById('results-count');
        
        listContainer.innerHTML = '';
        clearMarkers();

        countLabel.innerText = `${filteredData.length} PUNTOS DE INTERÉS`;

        filteredData.forEach((store, index) => {
            const dist = searchCenter ? distance(searchCenter.lat, searchCenter.lng, store.lat, store.lng).toFixed(1) + ' KM' : '';
            
            // Side Card
            const card = document.createElement('div');
            card.className = `store-item cursor-pointer group`;
            card.id = `listing-${store.id}`;
            card.innerHTML = `
                <div class="flex justify-between items-baseline mb-3">
                    <h3 class="text-3xl ds-title font-light">${store.name}</h3>
                    <span class="font-data text-[10px] font-black text-ds-secondary tracking-widest">${dist}</span>
                </div>
                <p class="text-ds-on-variant opacity-50 font-data text-[11px] mb-8 leading-relaxed max-w-[85%]">${store.addr}, ${store.city}</p>
                <div class="flex gap-10">
                    <button class="text-[9px] font-black uppercase tracking-[0.3em] text-ds-secondary flex items-center gap-2">
                        <span class="material-symbols-outlined text-sm">explore</span> Ver en mapa
                    </button>
                    <a href="https://www.google.com/maps/dir/?api=1&destination=${store.lat},${store.lng}" target="_blank" class="text-[9px] font-black uppercase tracking-[0.3em] text-ds-on-variant hover:text-ds-on-surface flex items-center gap-2">
                        <span class="material-symbols-outlined text-sm">directions</span> Ruta
                    </a>
                </div>
            `;
            
            card.onclick = () => selectStore(store, true);
            listContainer.appendChild(card);

            // Marker
            const markerIcon = L.divIcon({
                className: `custom-marker-div ${store.id === activeMarker?.id ? 'active-marker' : ''}`,
                html: `<div class="pin-premium"></div>`,
                iconSize: [24, 24],
                iconAnchor: [12, 12]
            });

            const marker = L.marker([store.lat, store.lng], { icon: markerIcon }).addTo(map);
            
            marker.on('click', () => selectStore(store, false));
            
            markers.push({ id: store.id, marker, store });
        });
    }

    function selectStore(store, fromList) {
        // Reset old
        document.querySelectorAll('.store-item').forEach(el => el.classList.remove('active'));
        
        // Update New
        const card = document.getElementById(`listing-${store.id}`);
        if (card) {
            card.classList.add('active');
            if (!fromList) card.scrollIntoView({ behavior: 'smooth', block: 'center' });
        }

        // Map Sync
        map.flyTo([store.lat, store.lng], 15, { duration: 1.2 });
        
        // Update Marker styling (re-render or DOM manipulation)
        markers.forEach(m => {
            const el = m.marker.getElement();
            if (el) el.classList.remove('active-marker');
        });
        
        const activeM = markers.find(m => m.id === store.id);
        if (activeM) {
            const el = activeM.marker.getElement();
            if (el) el.classList.add('active-marker');
        }
    }

    // Utilitarios
    function distance(lat1, lon1, lat2, lon2) {
        const p = 0.017453292519943295; // Math.PI / 180
        const c = Math.cos;
        const a = 0.5 - c((lat2 - lat1) * p)/2 + c(lat1 * p) * c(lat2 * p) * (1 - c((lon2 - lon1) * p))/2;
        return 12742 * Math.asin(Math.sqrt(a)); // 2 * R; R = 6371 km
    }

    function clearMarkers() {
        markers.forEach(m => map.removeLayer(m.marker));
        markers = [];
    }

    window.zoomToIncludeAll = () => {
        if (markers.length > 0) {
            const group = new L.featureGroup(markers.map(m => m.marker));
            map.fitBounds(group.getBounds().pad(0.3));
        }
    };

    window.filterByType = (type) => {
        document.querySelectorAll('.filter-btn').forEach(btn => {
            btn.classList.remove('bg-ds-secondary', 'text-ds-surface');
            btn.classList.add('text-ds-on-variant');
        });
        const activeBtn = document.getElementById(`btn-${type}`);
        activeBtn.classList.remove('text-ds-on-variant');
        activeBtn.classList.add('bg-ds-secondary', 'text-ds-surface');

        if (type === 'all') filteredData = [...masterData];
        else filteredData = masterData.filter(s => s.type === type);
        render();
    };

    window.useMyLocation = () => {
        if (navigator.geolocation) {
            showLoader(true);
            navigator.geolocation.getCurrentPosition(pos => {
                searchCenter = { lat: pos.coords.latitude, lng: pos.coords.longitude };
                map.flyTo([searchCenter.lat, searchCenter.lng], 13);
                performSearch(); // Re-sort by my location
            }, () => showLoader(false));
        }
    };

    function showLoader(show) {
        document.getElementById('loader').classList.toggle('hidden', !show);
    }

    function setupEventListeners() {
        document.getElementById('masos-search').addEventListener('keypress', (e) => {
            if (e.key === 'Enter') performSearch();
        });
    }

    // Kick-off
    document.addEventListener('DOMContentLoaded', init);
})();
</script>
